<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowForge</title>

    <link rel="stylesheet" href="styles/style.css">
</head>

<body>

    <header>
        <h1>FlowForge</h1>
        <p>Smart Task Productivity System</p>
    </header>

    <main>

        <section class="task-container">

            <h2>Add New Task</h2>

            <div class="task-form">

                <input
                    type="text"
                    id="taskInput"
                    placeholder="Enter a task..."
                >

                <button id="addTaskBtn">
                    Add Task
                </button>

            </div>

            <ul id="taskList"></ul>

        </section>

    </main>

    <script src="scripts/main.js"></script>

</body>

</html>
